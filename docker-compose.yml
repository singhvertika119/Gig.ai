services:
  mongodb:
    image: mongo:7
    container_name: gigai-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: gigai
    volumes:
      - mongodb_data:/data/db
    networks:
      - gigai-internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    # No ports published — reachable only on the internal network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigai-backend
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: gigai
      DEBUG: "false"
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - gigai-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigai-frontend
    restart: unless-stopped
    environment:
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gigai-internal
    ports:
      - "3000:3000"

  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: gigai-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - gigai-internal

networks:
  gigai-internal:
    driver: bridge
    name: gigai-internal

volumes:
  mongodb_data:
    name: gigai-mongodb-data
  n8n_data:
    name: gigai-n8n-data
